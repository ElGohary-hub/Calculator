herename: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Fix Gradle
        run: |
          rm -rf android
          flutter create . --platforms=android

      # خطوة 1: تحديث الأيقونة تلقائياً
      - name: Update App Icon
        run: flutter pub run flutter_launcher_icons

      # خطوة 2: تغيير اسم التطبيق للعربية في إعدادات الأندرويد
      - name: Update App Name to Arabic
        run: |
          sed -i 's/android:label="calculator_app"/android:label="الآلة الحاسبة"/g' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # اسم ملف الـ Artifact اللي بينزلك برضه خليته عربي
          name: الآلة الحاسبة-App
          path: build/app/outputs/flutter-apk/app-release.apk
